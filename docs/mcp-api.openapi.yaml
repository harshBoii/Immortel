openapi: 3.1.0
info:
  title: MCP Product API
  description: >
    API for searching products, retrieving product details, and creating checkout sessions
    from moonknight or moonflare product catalogs for MCP.
    Each request must specify the target company using either companyName or companyId.
    Always render featuredImage.url as an image image above product title and price.
  version: 1.0.0

servers:
  - url: https://immortel.vercel.app
    description: Production

paths:
  /api/mcp/products:
    get:
      operationId: list_products
      summary: List products
      description: >
        Returns paginated products for a company. Provide companyId or companyName.
        RENDERING - Show each product as a card with featuredImage.url as an image
        image above the title. Format price as priceMinAmount + currencyCode.
      parameters:
        - name: companyId
          in: query
          description: Company ID (Prisma cuid)
          required: false
          schema:
            type: string
        - name: companyName
          in: query
          description: Company name or slug (case-insensitive, e.g. MoonKnight or moonknight)
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number (default 1)
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: Items per page (default 50, max 200)
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - company
                  - data
                  - pagination
                properties:
                  success:
                    type: boolean
                    example: true
                  company:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      total:
                        type: integer
        "400":
          description: Missing companyId or companyName
        "404":
          description: Company not found

  /api/mcp/products/{id}:
    get:
      operationId: get_product_details
      summary: Get product details
      description: >
        Retrieve full details for a single product.
        RENDERING - Render featuredImage.url as a large image.
        Show images array as a gallery. Display price range from
        priceMinAmount to priceMaxAmount with currencyCode.
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: string
        - name: companyId
          in: query
          description: Company ID
          required: false
          schema:
            type: string
        - name: companyName
          in: query
          description: Company name or slug
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - company
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  company:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                  data:
                    $ref: "#/components/schemas/Product"
        "400":
          description: Missing companyId or companyName
        "404":
          description: Company or product not found

  /api/mcp/products/search:
    post:
      operationId: search_products
      summary: Search products
      description: >
        Full-text search over products using Elasticsearch.
        Supports natural-language queries like "black shoes" or "shoes under 5000".
        Provide companyId or companyName in the body.
        RENDERING - Render featuredImage.url as an image image before each title.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Search query such as "best snowboards" or "shoes under 5000"
                  example: find me best snowboards from MoonFlare
                companyId:
                  type: string
                  description: Company ID (provide this or companyName)
                companyName:
                  type: string
                  description: Company name or slug (provide this or companyId)
                page:
                  type: integer
                  default: 1
                pageSize:
                  type: integer
                  default: 20
                  maximum: 200
                status:
                  type: array
                  items:
                    type: string
                  description: Filter by status values such as ACTIVE or DRAFT
                priceMin:
                  type: number
                  description: Minimum price filter
                priceMax:
                  type: number
                  description: Maximum price filter
                inventoryMin:
                  type: integer
                inventoryMax:
                  type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - company
                  - data
                  - pagination
                properties:
                  success:
                    type: boolean
                    example: true
                  company:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      total:
                        type: integer
        "400":
          description: Missing query or company identifier
        "404":
          description: Company not found
        "502":
          description: Search backend error

  /api/mcp/products/checkout:
    post:
      operationId: create_checkout
      summary: Create checkout session
      description: Create a checkout session and return a payment portal URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productIds
              properties:
                companyId:
                  type: string
                  description: Company ID (provide this or companyName)
                companyName:
                  type: string
                  description: Company name or slug (provide this or companyId)
                productIds:
                  type: array
                  items:
                    type: string
                  description: List of product IDs to checkout
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - checkoutUrl
                properties:
                  success:
                    type: boolean
                    example: true
                  sessionId:
                    type: string
                  checkoutUrl:
                    type: string
                    format: uri
                    description: Payment portal URL to redirect the user for payment
                  company:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        price:
                          type: string
                        currency:
                          type: string
                  expiresAt:
                    type: string
                    format: date-time
        "400":
          description: Missing company or productIds
        "404":
          description: Company or products not found

components:
  schemas:
    Product:
      type: object
      description: >
        A Shopify catalog product. Always render featuredImage.url
        as a markdown image above the product title and price.
      properties:
        id:
          type: string
        shopifyGid:
          type: string
        shopId:
          type: string
        companyId:
          type: string
        title:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - DRAFT
            - ARCHIVED
        handle:
          type: string
        totalInventory:
          type: integer
        onlineStoreUrl:
          type: string
          format: uri
          nullable: true
        priceMinAmount:
          type: string
          nullable: true
          description: Minimum variant price e.g. 499.00
        priceMaxAmount:
          type: string
          nullable: true
          description: Maximum variant price e.g. 999.00
        currencyCode:
          type: string
          nullable: true
          description: ISO currency code e.g. USD or INR
        featuredImage:
          type: object
          nullable: true
          description: Primary product image. Render as a markdown image above the product title.
          properties:
            url:
              type: string
              format: uri
              description: Public HTTPS Shopify CDN URL. Render as image.
            altText:
              type: string
              nullable: true
            width:
              type: integer
              nullable: true
            height:
              type: integer
              nullable: true
        shopifyCreatedAt:
          type: string
          format: date-time
        shopifyUpdatedAt:
          type: string
          format: date-time
